{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css\base.css' %}">
</head>
<body>
    {% block style %}
    {% endblock %}
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand hd fw-bold" href="#">
                <img class="logo" src="{% static 'images/tlogo.png' %}" alt="">
                Talent Flow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto me-5">
                    <li class="nav-item mx-5">
                        <a class="nav-link active fw-bold" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item mx-5">
                        <a class="nav-link fw-bold" href="/findjob/">Find Job</a>
                    </li>
                    <li class="nav-item mx-5">
                        <a class="nav-link fw-bold" href="/profile/">Profile</a>
                    </li>
                    <li class="nav-item mx-5">
                        <a class="nav-link fw-bold" href="/dashboard/">Dashboard</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto gap-3 me-5">
                    <li class="nav-item">
                        <a class="nav-link br text-center fw-bold" href="/contactus/">Contact Us</a>
                    </li>
                    {% if request.user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link br1 text-center fw-bold" href="/logout/">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link br1 text-center fw-bold" href="/login/">Login</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}
        
    {% endblock %}
    {% if messages %}
        <script>
            {% for message in messages %}
                alert("{{ message|safe }}");
            {% endfor %}
        </script>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
